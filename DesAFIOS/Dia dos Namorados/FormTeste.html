<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quer namorar comigo?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-card">
        <h1>Quer namorar comigo? ❤️</h1>
        
        <form action="cadastro.php" method="get" autocomplete="on">
            <fieldset>
                <legend>Tenha uma escolha consciente e livre ✨</legend>
                
                <div class="opcao-item">
                    <input type="checkbox" name="sim" id="isim"> 
                    <label for="isim">Sim 😍</label>
                </div>

                <div class="opcao-item armadilha">
                    <input type="checkbox" name="nao" id="inao"> 
                    <label for="inao">Não 😢</label>
                </div>

                <div class="opcao-item armadilha">
                    <input type="checkbox" name="nunca" id="inunca"> 
                    <label for="inunca">De jeito nenhum 💔</label>
                </div>

                <div class="opcao-item armadilha">
                    <input type="checkbox" name="jamais" id="ijamais"> 
                    <label for="ijamais">Jamais 🛑</label>
                </div>

                <div class="opcao-item armadilha">
                    <input type="checkbox" name="nempensar" id="inempensar"> 
                    <label for="inempensar">Nem pensar 🙅‍♂️</label>
                </div>

                <div class="opcao-item">
                    <input type="checkbox" name="comctz" id="icomctz"> 
                    <label for="icomctz">Com certeza! 💖</label>
                </div>

            </fieldset> 

            <div class="botoes-container">
                <input type="submit" value="Enviar Resposta! 🚀" class="btn-enviar">
                <input type="reset" value="Limpar" class="btn-limpar">
            </div>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
