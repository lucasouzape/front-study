<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem de tabela</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        body {
            font-family: Arial, sans-serif;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de tabela</h1>
    <table>
        <tr>
            <td>1</td>
            <td colspan="1">2 </td>
            <td rowspan="2" colspan="2">3</td>
                      <td>4</td>
        </tr>
       <tr>
  
            <td>5</td>
            <td>6 </td>
            <td >7 </td>
        </tr>
       <tr>
   
            <td colspan="4">8  </td>
            <td>9  </td>
        </tr>      
        <tr>
            <td rowspan="2">10 </td>
            <td colspan="3">11  </td>
            <td>12  </td>
        </tr>    
        <tr>
            <td >13 </td>
            <td>14  </td>
            <td colspan="2.5">15  </td>
            </tr>
</body>
</html>
