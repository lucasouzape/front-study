<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Teste de formulario</h1>
    <form action="cadastro.php" method="get">
    <p>
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" 
        placeholder="Digite seu nome Completo" autocomplete="name" required minlength="3" maxlength="50" size="30"
        required>
    </p>
    <p>
        <label for="media">Média:</label>
        <input type="number" id="media" name="media" size="50"
        placeholder="Digite sua média" autocomplete="off" required min="0" max="10" step="0.1"  maxlength="40"
        required>
    </p>

    <p>
        <label for ="mes">Mes:</label>
        <input type="month" id="mes" name="mes" value="2026-02" size = "2" required
        placeholder="Digite o mes e ano" autocomplete="off" min="1"max="12">
    </p>

    <p>
        <label for="data">Data de Prova:</label>
        <input type="date" id="data" name="data" size="50">     
    </p>

    <p>
        <label for="hora">Hora da Prova:</label>
        <input type="time" id="hora" name="hora" size="50">
    </p>






    <input type="submit" value="Enviar">
    <input type="reset" value="Limpar">
    </form>
    
</body>
</html>
