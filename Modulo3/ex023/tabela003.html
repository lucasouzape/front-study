<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mesclagem de tabela</title>
    <style>
        table {
            border-collapse: collapse;
            width: 300px;
        }

        body {
            font-family: Arial, sans-serif;
        }

        td, th {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Mesclagem de tabela</h1>
    <table>
        <tr>
            <td>A</td>
            <td colspan="2">B </td>
            <td rowspan="3">C </td>
        </tr>
       <tr>
            <td>D</td>
            <td>E</td>
            <td>F </td>
        </tr>
       <tr>
            <td >G </td>
            <td>H  </td>
            <td>I  </td>
        </tr>      
        <tr>
            <td >J </td>
            <td>K  </td>
            <td>L  </td>
            <td>M  </td>
        </tr>    
</body>
</html>
