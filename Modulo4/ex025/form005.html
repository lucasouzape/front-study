<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1> Exemplo de formulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Dados Pessoais</legend>
            <p>
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required autocomplete="name" minlength="4" maxlength="20"><br><br>
            </p>
            
            <p>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required autocomplete="email"><br><br>
            </p>
            <p>
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required autocomplete="tel"
                pattern="^[0-9]{4}-[0-9]{4}$" required placeholder="(00)0000-0000"> <br><br>
            </p>
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        </fieldset>
    </form>
</body>
</html>
