<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de fomulario</h1>
    <form action="cadastro.php" method="get" autocomplete="on">
        <fieldset>
            <legend>Sexo </legend>
            <input type="radio" name="sexo" id="masculino"> <label for="masculino">Masculino</label><br>
            <input type="radio" name="sexo" id="feminino"> <label for="feminino">Feminino</label><br>
        </fieldset>
        <fieldset>
            <legend>Esportes favoritos</legend>
            <input type="checkbox" name="esfut" id="iesfut"> <label for="iesfut">Futebol</label><br>
            <input type="checkbox" name="esbas" id="iesbas"> <label for="iesbas">Basquete</label><br>
            <input type="checkbox" name="esvolei" id="iesvolei"> <label for="iesvolei">Volei</label><br>
            <input type="checkbox" name="esnatacao" id="iesnatacao"> <label for="iesnatacao">Natacao</label><br>

        </fieldset> 




        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>
    </form>
    
</body>
</html>
