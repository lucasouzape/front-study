<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
</head>
<body>
    <h1>Exemplo de fomulario</h1>
    <form action="cadastro.php" method="post" autocomplete="on">

        <p>
            <label for="cor">Cor: </label>
            <input type="color" name="cor" id="cor" value="#00ff22">
        </p>

        <p>
            <label for="inivel">Nivel de satisfacao: </label>
            <input type="range" name="nivel" id="inivel" min="0" max="100" value="15">

        <p>
            <input type="submit" value="Enviar">
            <input type="reset" value="Limpar">
        </p>

        <p>
            <label for="ifoto">Foto de perfil: </label>
            <input type="file" name="foto" id="ifoto" accept="image/*">   
        </p>
        </form>

        
    
</body>
</html>
