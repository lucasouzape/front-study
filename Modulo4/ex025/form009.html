<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Meu primeiro formulario</h1>
    <form action="cadastro.php" method="POST" >

        <p>
            <label for= "in1">Numero 1:</label>
            <input type="number" id="in1" name="n1" min="0" max="50" required 
            oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)" ><br><br>
        </p>

        <p>
            <label for= "in2">Numero 2:</label>
            <input type="number" id="in2" name="n2" min="0" max="50" required
            oninput="isoma.innerHTML = Number(in1.value) + Number(in2.value)"><br><br>
            
        </p>

        <p>
            <label for="isoma">Soma:</label>
            <output id="isoma" name="soma" for="in1 in2"></output><br><br>
        </p>
        <input type="submit" value="Enviar">
    </form>
    
</body>
</html>
