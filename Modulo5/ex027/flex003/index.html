<html lang="en">
<head>

            text-align: center;
            flex: auto;
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="item">Exemplo de BlocoC</div>
        <div class="item">Exemplo de BlocoD</div>
        <div class="item">Exemplo de BlocoE</div>
        <div class="item">Exemplo de BlocoF</div>

    </div>
    
</body>
</html>
